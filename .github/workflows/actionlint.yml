---
name: actionlint
'on':
  pull_request:
  push:
    branches: [master]
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  actionlint:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - id: get
        run: |
          srv=https://raw.githubusercontent.com/rhysd/actionlint
          ver=v1.7.12
          bash <(curl --silent "$srv/$ver/scripts/download-actionlint.bash")
      - run: ${{ steps.get.outputs.executable }}
